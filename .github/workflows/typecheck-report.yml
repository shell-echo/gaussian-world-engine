name: Typecheck Report

on:
  pull_request:
    branches: [main]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - name: Capture typecheck
        run: npm run typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck.log
