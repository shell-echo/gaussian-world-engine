name: Typecheck Report

on:
  pull_request:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Capture typecheck
        run: npm run typecheck > typecheck.log 2>&1 || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck.log
